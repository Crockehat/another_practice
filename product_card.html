<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дом кружек</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="sidebar cart-sidebar" id="cartSidebar">
    <div class="average cart-sidebar-thing">
      <div class="the-cart d-flex justify-content-between align-items-center mb-4">
        <p>Корзина</p>
        <button class="btn btn-link" id="closeCartBtn">
          <i class="fas fa-times fa-2x" style="color: #465940"></i>
        </button>
      </div>
    </div>
    <div class="side-bar-fix">
      <div id="cartItemsContainer">
        <div class="empty-state">
          <i class="fa-solid fa-bag-shopping"></i>
          <p>Загрузка...</p>
        </div>
      </div>
      <div class="mt-4 pt-3 border-top" id="cartFooter">
        <div class="d-flex justify-content-between mb-3">
          <span class="h5">Итого:</span>
          <span class="h5" id="cartTotal">0 ₽</span>
        </div>
        <button class="btn btn-primary w-100 mb-2 btn-custom" id="checkoutBtn">
          <i class="fas fa-credit-card me-2"></i>Оформить заказ
        </button>
        <button class="delete btn btn-outline-danger w-100 btn-custom" id="clearCartBtn">
          <i class="fas fa-trash me-2"></i>Очистить корзину
        </button>
      </div>
    </div>
  </div>

  <div class="sidebar favorites-sidebar" id="favoritesSidebar">
    <div class="average cart-sidebar-thing">
      <div class="the-cart d-flex justify-content-between align-items-center mb-4">
        <p class="mb-0">Избранное</p>
        <button class="btn btn-link" id="closeFavoritesBtn">
          <i class="fas fa-times fa-2x" style="color: #465940"></i>
        </button>
      </div>
    </div>
    <div class="side-bar-fix">
      <div id="favoritesItemsContainer">
        <div class="empty-state">
          <i class="fas fa-heart"></i>
          <p>Загрузка...</p>
        </div>
      </div>
      <div class="mt-4 pt-3 border-top" id="favoritesFooter">
        <button class="delete btn btn-outline-danger w-100 btn-custom" id="clearFavoritesBtn">
          <i class="fas fa-trash me-2"></i>Очистить избранное
        </button>
      </div>
    </div>
  </div>

  <nav class="navbar mb-4 average">
    <div class="container-fluid">
      <a href="index.html" class="navbar-brand h1 mb-0 text-white" style="text-decoration: none;">Дом кружек</a>
      <div class="d-flex align-items-center gap-3">
        <div class="nav-buttons" style="cursor: pointer" id="cartBtn">
          <div class="nav-buttons-spec">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="badge-custom" id="cartCount">0</span>
          </div>
          <p>Корзина</p>
        </div>
        <div class="nav-buttons" style="cursor: pointer" id="favoritesBtn">
          <div class="nav-buttons-spec">
            <i class="fas fa-heart fa-xl"></i>
            <span class="badge-custom" id="favoritesCount">0</span>
          </div>
          <p>Избранное</p>
        </div>
        <div class="nav-buttons" style="cursor: pointer">
          <div class="nav-buttons-spec">
            <i class="fa-solid fa-user"></i>
          </div>
          <p>Аккаунт</p>
        </div>
      </div>
    </div>
  </nav>

  <div class="mb-4 average big-product-card" id="productCardContainer">
    <img id="productImg" src="" alt="">
    <div class="big-product-card-info">
      <p class="mb-2 title-thing" id="productName"></p>
      <p class="mb-4 big-product-card-cost" id="productPrice"></p>
      <div class="mb-4 whatever-p" id="productBasicInfo">
        <p id="productCategory"></p>
        <p id="productDetails"></p>
      </div>
      <ul class="ingredients" id="productComposition"></ul>
      <div class="mb-4 whatever-p" id="productExtraInfo">
        <p id="productMaterial"></p>
        <p id="productManufacturer"></p>
        <p id="productCountry"></p>
      </div>
      
      <button class="btn-big-product-card btn btn-primary mb-3 btn-custom add-to-cart" id="addToCartBtn">
        <i class="fa-solid fa-bag-shopping"></i> В корзину
      </button>
      <button class="btn-big-product-card btn btn-outline-danger btn-custom add-to-fav" id="addToFavBtn">
        <i class="fas fa-regular fa-heart me-2"></i> В избранное
      </button>
    </div>
  </div>

  <footer class="average">
    <div class="footer-info">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d642.3834906487501!2d73.37785042671824!3d54.98722904565201!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x43aafe1a80e84ef1%3A0x2addd6e022097507!2z0J7QvNGB0LrQuNC5INCw0LLRgtC-0YLRgNCw0L3RgdC_0L7RgNGC0L3Ri9C5INC60L7Qu9C70LXQtNC2!5e0!3m2!1sru!2sru!4v1775098404026!5m2!1sru!2sru" width="50%" height="100%" style="border-radius: 60px;" allowfullscreen="" loading="lazy"></iframe>
      <div>
        <p>Наш адрес:</p>
        <p class="mb-4">улица Карла Либкнехта, 24</p>
        <p>Контакты:</p>
        <p>+79994603380</p>
        <p>doubledcups@gmail.com</p>
      </div>
      <div class="cool-links">
        <p>Полезные ссылки:</p>
        <a href="index.html"><button class="btn btn-primary mb-2 btn-footer">Главная</button></a>
        <button class="btn btn-primary mb-2 btn-footer">Аккаунт</button>
      </div>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
